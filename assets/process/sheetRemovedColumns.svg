<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Workbook with removed columns">
  <rect width="1200" height="650" fill="#f8fafc"/>
  <g font-family="Arial, sans-serif">
    <rect x="0" y="0" width="1200" height="42" fill="#111827"/>
    <text x="70" y="30" fill="#e5e7eb" font-size="22">T</text><text x="430" y="30" fill="#e5e7eb" font-size="22">U</text><text x="790" y="30" fill="#e5e7eb" font-size="22">V</text>
    <rect x="0" y="42" width="720" height="58" fill="#04d9d9"/>
    <line x1="360" y1="42" x2="360" y2="650" stroke="#111827"/>
    <line x1="720" y1="42" x2="720" y2="650" stroke="#111827"/>
    <text x="84" y="90" font-size="26" font-weight="700">Circuit Playground</text>
    <text x="482" y="90" font-size="26" font-weight="700">Lego</text>
    <rect x="0" y="100" width="720" height="240" fill="#fff"/>
    <rect x="0" y="340" width="720" height="240" fill="#fff3cd"/>
    <g fill="#3b82f6" font-size="26">
      <text x="16" y="195">Name 3 things a Circuit</text>
      <text x="16" y="232">Playground can do</text>
      <text x="392" y="195">Build the tallest tower of</text>
      <text x="392" y="232">stacked bricks you can</text>
      <text x="16" y="455">Connect your Circuit Playground to</text>
      <text x="16" y="492">a laptop</text>
      <text x="392" y="455">Build a house using</text>
      <text x="392" y="492">interlocking bricks</text>
    </g>
    <text x="760" y="195" fill="#64748b" font-size="22">Pipe Cleaners and 3D Pen columns are absent here.</text>
  </g>
</svg>
